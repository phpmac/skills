# Claude Code 多供应商代理 - 根据模型名自动路由
# 支持每个供应商配置多个 key (逗号分隔), 自动轮换, 失败切换, 冷却恢复
# 启动:
# docker run -d --name claude-proxy --restart always -p 7:8080 \
#   -e KEY_ZAI="key1,key2,key3" \
#   -e KEY_MINIMAX="your-minimax-key" \
#   -e KEY_KIMI="your-kimi-key" \
#   -e KEY_XIAOMI="your-xiaomi-key" \
#   -e KEY_OPENROUTER="your-openrouter-key" \
#   -e KEY_OLLAMA="your-ollama-key" \
#   -e KEY_DEEPSEEK="your-deepseek-key" \
#   -v ~/Downloads/skills/plugins/my-agents/scripts/claude-proxy/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro \
#   openresty/openresty:alpine-fat sh -c "opm get ledgetech/lua-resty-http 2>/dev/null; openresty -g 'daemon off;'"
worker_processes auto;
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
    resolver_timeout 5s;

    # 日志显示供应商和模型
    log_format main '$remote_addr [$time_local] $status $body_bytes_sent '
                    '$request_time [$upstream_provider] model="$upstream_model" key=$upstream_key'
                    '$upstream_key_switch';
    access_log /dev/stdout main;

    client_max_body_size 50m;
    client_body_buffer_size 50m;

    # 跨 worker 共享 key 冷却状态
    lua_shared_dict key_cooldowns 1m;

    init_by_lua_block {
        -- 冷却时间(秒)
        local COOLDOWN = 60

        -- 将逗号分隔的 key 字符串转为数组
        local function split_keys(env_val)
            if env_val == "" then return {} end
            local keys = {}
            for k in env_val:gmatch("[^,]+") do
                k = k:match("^%s*(.-)%s*$")
                if k ~= "" then table.insert(keys, k) end
            end
            return keys
        end

        -- 从 provider 中选取可用 key (轮换 + 跳过冷却中的 key)
        function _G.select_key(provider)
            local keys = provider.keys
            local n = #keys
            if n == 0 then return nil, "no keys for " .. provider.name end

            local cooldowns = ngx.shared.key_cooldowns
            local start = provider.rr_index

            -- 从当前位置扫描, 跳过冷却中的 key
            for i = 1, n do
                local idx = ((start - 1 + i - 1) % n) + 1
                local fail_time = cooldowns:get(provider.name .. ":" .. idx)
                if not fail_time or (ngx.now() - fail_time >= COOLDOWN) then
                    if fail_time then cooldowns:delete(provider.name .. ":" .. idx) end
                    provider.rr_index = (idx % n) + 1
                    return keys[idx], idx
                end
            end

            -- 所有 key 都在冷却中, 选最早过期的
            local best_idx, earliest = 1, nil
            for i = 1, n do
                local ft = cooldowns:get(provider.name .. ":" .. i)
                if ft and (not earliest or ft < earliest) then
                    earliest, best_idx = ft, i
                end
            end
            provider.rr_index = (best_idx % n) + 1
            return keys[best_idx], best_idx
        end

        -- 标记 key 失败, 写入冷却
        function _G.mark_key_failed(provider, key_idx)
            ngx.shared.key_cooldowns:set(provider.name .. ":" .. key_idx, ngx.now(), COOLDOWN + 5)
        end

        _G.providers = {
            { name="zai", host="api.z.ai", path="/api/anthropic/v1/messages",
              keys=split_keys(os.getenv("KEY_ZAI") or ""), rr_index=1,
              patterns={"glm"} },
            { name="minimax", host="api.minimaxi.com", path="/anthropic/v1/messages",
              keys=split_keys(os.getenv("KEY_MINIMAX") or ""), rr_index=1,
              patterns={"minimax"} },
            { name="kimi", host="api.kimi.com", path="/coding/v1/messages",
              keys=split_keys(os.getenv("KEY_KIMI") or ""), rr_index=1,
              patterns={"kimi"} },
            { name="xiaomi", host="token-plan-cn.xiaomimimo.com", path="/anthropic/v1/messages",
              keys=split_keys(os.getenv("KEY_XIAOMI") or ""), rr_index=1,
              patterns={"mimo"} },
            { name="ollama", host="ollama.com", path="/v1/messages",
              keys=split_keys(os.getenv("KEY_OLLAMA") or ""), rr_index=1,
              patterns={"ollama"} },
            { name="deepseek", host="api.deepseek.com", path="/anthropic/v1/messages",
              keys=split_keys(os.getenv("KEY_DEEPSEEK") or ""), rr_index=1,
              patterns={"deepseek"} },
        }

        -- 未匹配任何供应商时使用 OpenRouter 作为 fallback
        _G.fallback = {
            name="openrouter", host="openrouter.ai", path="/api/v1/messages",
            keys=split_keys(os.getenv("KEY_OPENROUTER") or ""), rr_index=1,
        }

        -- 根据模型名匹配供应商(忽略大小写), 返回 (provider, is_fallback)
        -- 带 :cloud 标签直接走 ollama 官方, 不带走本地供应商匹配
        function match_provider(model)
            if model:find(":cloud", 1, true) then
                -- ollama 是 providers 数组最后一个元素
                return _G.providers[#_G.providers], false
            end
            local model_lower = model:lower()
            for _, p in ipairs(_G.providers) do
                for _, pat in ipairs(p.patterns) do
                    if model_lower:find(pat:lower()) then return p, false end
                end
            end
            -- 没有匹配, 直接走 OpenRouter fallback, 保持原始模型名
            return _G.fallback, true
        end
    }

    server {
        listen 8080;
        set $upstream_provider "-";
        set $upstream_model "-";
        set $upstream_key "-";
        set $upstream_key_switch "";

        location = /health {
            content_by_lua_block { ngx.say('{"status":"ok"}') }
        }

        location /v1/models {
            content_by_lua_block {
                local cjson = require "cjson"
                ngx.header["Content-Type"] = "application/json"
                ngx.say(cjson.encode({
                    data = {
                        {id = "kimi-for-coding", object = "model"},
                        {id = "MiniMax-M2.7-highspeed", object = "model"},
                        {id = "GLM-5.1", object = "model"}
                    },
                    object = "list"
                }))
            }
        }

        location /v1/messages {
            content_by_lua_block {
                -- count_tokens 端点直接返回模拟响应
                if ngx.var.request_uri:find("count_tokens") then
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say('{"input_tokens":0}')
                    return
                end

                local http = require "resty.http"
                local cjson = require "cjson"

                -- 校验 token
                local headers = ngx.req.get_headers()
                local token = headers["x-api-key"] or ""
                if token == "" then
                    local auth = headers["Authorization"] or headers["authorization"] or ""
                    token = auth:match("Bearer%s+(.+)") or ""
                end
                if token ~= "a" then ngx.status=401; ngx.say('{"error":"unauthorized"}'); return end

                ngx.req.read_body()
                local body = ngx.req.get_body_data()
                if not body then ngx.status=400; ngx.say('{"error":"empty body"}'); return end

                local ok_data, data = pcall(cjson.decode, body)
                if not ok_data then ngx.status=400; ngx.say('{"error":"bad json"}'); return end

                local model = data.model or ""

                -- 匹配供应商
                local provider, is_fallback = match_provider(model)
                ngx.var.upstream_model = model
                ngx.var.upstream_provider = provider.name

                -- 构建请求路径
                local req_path = provider.path
                local args = ngx.var.args
                if args then req_path = req_path .. "?" .. args end

                -- 检查是否有可用 key
                local max_retries = #provider.keys
                if max_retries == 0 then
                    ngx.status=503; ngx.say('{"error":"no keys for ' .. provider.name .. '"}')
                    return
                end

                -- 发送请求 (内部函数)
                local function send_request(key)
                    local httpc = http.new()
                    httpc:set_timeouts(30000, 120000, 300000)
                    local ok, err = httpc:connect(provider.host, 443)
                    if not ok then return nil, "connect(" .. provider.name .. "): " .. err end
                    local _, err = httpc:ssl_handshake(nil, provider.host, false)
                    if err then httpc:close(); return nil, "ssl(" .. provider.name .. "): " .. err end
                    local res, err = httpc:request({
                        method = "POST",
                        path = req_path,
                        body = body,
                        headers = {
                            ["Content-Type"] = "application/json",
                            ["x-api-key"] = key,
                            ["Authorization"] = "Bearer " .. key,
                            ["Host"] = provider.host,
                            ["anthropic-version"] = "2023-06-01",
                            ["User-Agent"] = headers["user-agent"] or "a",
                        },
                    })
                    if not res then httpc:close(); return nil, err end
                    return res, nil, httpc
                end

                -- 流式转发响应 (内部函数)
                local function stream_response(res, httpc)
                    ngx.status = res.status
                    for k, v in pairs(res.headers) do
                        local lk = k:lower()
                        if lk ~= "transfer-encoding" and lk ~= "connection" then
                            ngx.header[k] = v
                        end
                    end
                    if data.stream then ngx.header["X-Accel-Buffering"] = "no" end
                    local reader = res.body_reader
                    if reader then
                        repeat
                            local chunk = reader(8192)
                            if chunk then ngx.print(chunk); ngx.flush(true) end
                        until not chunk
                    end
                    httpc:set_keepalive(60000, 10)
                end

                -- 多 key 重试循环
                local last_err
                for attempt = 1, max_retries do
                    local key, key_idx = _G.select_key(provider)
                    if not key then
                        ngx.status=503; ngx.say('{"error":"' .. (key_idx or "no key") .. '"}')
                        return
                    end

                    ngx.var.upstream_key = key_idx

                    local res, err, httpc = send_request(key)

                    if not res then
                        -- 连接/请求失败
                        _G.mark_key_failed(provider, key_idx)
                        ngx.log(ngx.WARN, "[" .. provider.name .. "] key " .. key_idx .. " model=" .. model .. " failed: " .. err .. ", switching...")
                        ngx.var.upstream_key_switch = " key" .. key_idx .. "->" .. (key_idx % max_retries + 1)
                        last_err = err
                    elseif res.status ~= 200 then
                        -- 非 200: 消费响应体释放连接, 标记失败, 重试下一个 key
                        local body_err = ""
                        local reader = res.body_reader
                        if reader then
                            local chunks = {}
                            repeat
                                local chunk = reader(8192)
                                if chunk then table.insert(chunks, chunk) end
                            until not chunk
                            body_err = table.concat(chunks)
                        end
                        httpc:set_keepalive(60000, 10)
                        _G.mark_key_failed(provider, key_idx)
                        ngx.log(ngx.WARN, "[" .. provider.name .. "] key " .. key_idx .. " model=" .. model .. " got " .. res.status .. ": " .. body_err .. ", switching...")
                        ngx.var.upstream_key_switch = " key" .. key_idx .. "->" .. (key_idx % max_retries + 1)
                        last_err = "upstream " .. res.status
                    else
                        -- 200 成功, 转发响应
                        stream_response(res, httpc)
                        return
                    end
                end

                -- 所有 key 耗尽
                ngx.status=502
                ngx.say('{"error":"all keys failed for ' .. provider.name .. ': ' .. last_err .. '"}')
            }
        }
    }
}
