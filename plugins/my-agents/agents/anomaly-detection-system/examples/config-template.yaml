# 异常检测系统完整配置模板

anomaly_detection:
  # ============================================
  # 广告积分检测
  # ============================================
  ad_score:
    # 重复检测
    repeat:
      window_minutes: 30
      count_threshold: 2
      severity: P1

    # 大额检测
    large:
      threshold: 1000
      daily_count_limit: 10
      severity: P2

    # 小额检测
    small:
      threshold: 1
      ratio_threshold: 0.9
      severity: P2

    # 频率检测
    frequency:
      window_minutes: 30
      limit: 50
      daily_limit: 500
      severity: P1

    # 验证状态检测
    verification:
      ratio_threshold: 0.7
      window_hours: 24
      severity: P1

  # ============================================
  # 资金盘检测
  # ============================================
  ponzi:
    # 充值检测
    deposit:
      repeat_window_minutes: 30
      repeat_count: 2
      amount_tolerance: 0.01
      large_threshold: 10000
      small_threshold: 100
      small_ratio: 0.8
      severity: P0

    # 频率检测
    frequency:
      window_minutes: 60
      limit: 5
      daily_limit: 20
      severity: P1

    # 质押检测
    staking:
      lock_minutes: 60
      fast_unlock_ratio: 0.3
      batch_window_seconds: 60
      batch_count: 5
      total_threshold: 100000
      velocity_threshold: 2
      severity: P0

    # 静态释放
    static_release:
      daily_limit: 1
      interval_hours: 24
      severity: P0

    # 提现检测
    withdraw:
      large_threshold: 5000
      small_threshold: 10
      severity: P1

  # ============================================
  # 资金流水检测 (核心)
  # ============================================
  cash_flow:
    # 核心比例检测
    ratio:
      withdraw_deposit_ratio: 1.5
      cumulative_window_days: 30
      net_withdraw_threshold: 0
      risk_ratio_threshold: 0.5
      severity: P0

    # 快进快出检测
    fast_in_out:
      minutes: 10
      ratio: 0.8
      severity: P0

    # 日内突变检测
    daily_spike:
      ratio: 3.0
      baseline_days: 7
      severity: P1

    # 循环检测
    cycle:
      window_minutes: 60
      count_limit: 3
      severity: P1

    # 余额异常检测
    balance:
      zero_ratio: 0.9
      observation_days: 30
      severity: P2

    # 新账户检测
    new_account:
      days: 7
      first_withdraw_ratio: 0.5
      severity: P1

  # ============================================
  # 交易所风控
  # ============================================
  exchange:
    # 充值监控
    deposit:
      large_threshold: 10000
      frequency_24h: 10
      fast_out_minutes: 10
      buy_ratio_threshold: 0.8
      severity: P0

    # 交易监控
    trading:
      otr_threshold: 50
      cancel_rate_threshold: 0.8
      message_rate_limit: 1000
      hft_seconds: 20
      hft_daily_count: 20
      severity: P1

    # 大额交易
    large_tx:
      low_risk: 10000
      medium_risk: 50000
      high_risk: 100000
      extreme_risk: 100000
      severity: P1

    # 持仓监控
    position:
      max_leverage: 25
      mmr_warning: 1.5
      mmr_call: 1.0
      mmr_liquidation: 0.8
      severity: P0

    # 市场操纵
    manipulation:
      wash_trade_threshold: 0.8
      price_deviation_threshold: 0.01
      layering_levels: 10
      layering_cancel_rate: 0.9
      severity: P1

  # ============================================
  # 银行AML监控
  # ============================================
  aml:
    # CTR配置
    ctr:
      us_threshold: 10000
      eu_threshold: 10000
      aggregation_days: 1
      severity: P2

    # SAR配置
    sar:
      bank_threshold: 5000
      msb_threshold: 2000
      severity: P1

    # Structuring检测
    structuring:
      window_days: 30
      sub_threshold_ratio: 0.95
      frequency_threshold: 5
      clustering_window_hours: 24
      severity: P0

    # 客户风险评级
    risk_rating:
      low_max_score: 10
      medium_max_score: 20
      review_frequency_days:
        low_risk: 1095
        medium_risk: 730
        high_risk: 365

    # 红旗指标
    red_flags:
      fast_money_velocity_minutes: 10
      impossible_travel_hours: 1

  # ============================================
  # 区块链链上监控
  # ============================================
  onchain:
    # AML监控
    aml:
      usdt_threshold: 100000
      usdc_threshold: 50000
      btc_threshold: 2
      eth_threshold: 100
      velocity_outflow_ratio: 0.5
      velocity_period_hours: 1
      frequency_24h: 20
      address_count_limit: 10
      severity: P0

    # 稳定币监控
    stablecoin:
      price_deviation_warning: 0.005
      price_deviation_critical: 0.01
      price_deviation_emergency: 0.03

    # DEX监控
    dex:
      flash_loan_size_threshold: 1000000
      wash_trade_score: 0.8
      liquidity_drop_ratio: 0.5
      price_deviation: 0.01
      whale_ratio: 0.1

    # 混币检测
    mixer:
      tornado_cash_blacklist: true
      graph_hop_limit: 3
      peel_chain_analysis: true
      gnn_confidence_threshold: 0.8

# ============================================
# 预警通知配置
# ============================================
alerts:
  channels:
    - type: email
      enabled: true
      recipients:
        - risk@example.com
        - compliance@example.com
    - type: telegram
      enabled: true
      bot_token: ${TELEGRAM_BOT_TOKEN}
      chat_id: ${ALERT_CHAT_ID}
    - type: webhook
      enabled: true
      url: ${WEBHOOK_URL}
      timeout_seconds: 10
      retry_count: 3
    - type: slack
      enabled: false
      webhook_url: ${SLACK_WEBHOOK_URL}

  # 级别配置
  levels:
    P0:
      name: 紧急
      channels: [email, telegram, webhook]
      urgency: immediate
      auto_block: true
      require_manual_approval: true
    P1:
      name: 警告
      channels: [telegram, webhook]
      urgency: high
      auto_block: true
      require_manual_approval: false
    P2:
      name: 观察
      channels: [webhook]
      urgency: normal
      auto_block: false
      require_manual_approval: false
    P3:
      name: 记录
      channels: []
      urgency: low
      auto_block: false
      require_manual_approval: false

  # 抑制规则 (避免重复报警)
  suppression:
    enabled: true
    same_rule_cooldown_minutes: 60
    same_user_cooldown_minutes: 15

# ============================================
# 关联检测配置
# ============================================
correlation:
  enabled: true

  # 积分+充值双异常
  score_deposit:
    score_anomaly_threshold: 10
    deposit_anomaly_threshold: 5000
    severity: P0

  # 质押+出金关联
  staking_withdraw:
    time_window_minutes: 30
    amount_ratio: 0.5
    severity: P0

  # 充值+提现比例
  deposit_withdraw_ratio:
    ratio_threshold: 1.5
    severity: P0

  # 多账户协同
  multi_account:
    same_device_threshold: 3
    same_ip_threshold: 5
    severity: P1

# ============================================
# 数据源配置
# ============================================
datasources:
  # 主数据库
  primary:
    type: postgresql
    host: ${DB_HOST}
    port: 5432
    database: anomaly_detection
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    pool_size: 20

  # 时序数据库
  timeseries:
    type: influxdb
    url: ${INFLUXDB_URL}
    token: ${INFLUXDB_TOKEN}
    org: anomaly_detection
    bucket: metrics

  # 图数据库
  graph:
    type: neo4j
    uri: ${NEO4J_URI}
    username: ${NEO4J_USERNAME}
    password: ${NEO4J_PASSWORD}

  # 缓存
  cache:
    type: redis
    host: ${REDIS_HOST}
    port: 6379
    db: 0

# ============================================
# 流处理配置
# ============================================
streaming:
  type: kafka
  brokers:
    - ${KAFKA_BROKER_1}
    - ${KAFKA_BROKER_2}
  topics:
    transactions: transactions
    alerts: alerts
    audit: audit
  consumer_group: anomaly_detection
  max_poll_records: 500
  max_poll_interval_ms: 300000
