# Claude Code 多供应商代理 - 根据模型名自动路由
# 启动: docker run -d --name claude-proxy --restart always -p 7:8080 -v ~/Downloads/skills/plugins/my-agents/claude-proxy/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro openresty/openresty:alpine-fat sh -c "opm get ledgetech/lua-resty-http 2>/dev/null; openresty -g 'daemon off;'"
worker_processes auto;
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
    resolver_timeout 5s;

    # 日志显示供应商和模型
    log_format main '$remote_addr [$time_local] $status $body_bytes_sent '
                    '$request_time [$upstream_provider] model="$upstream_model"';
    access_log /dev/stdout main;

    client_max_body_size 50m;
    client_body_buffer_size 50m;

    init_by_lua_block {
        _G.providers = {
            { name="zai", host="api.z.ai", path="/api/anthropic/v1/messages",
              key="c4b21fbe600f466cb88f126899134b67.zUeQkIReXI5gPME5",
              patterns={"glm", "GLM"} },
            { name="minimax", host="api.minimaxi.com", path="/anthropic/v1/messages",
              key="sk-cp-_QIpjsNBeB72vn_2kv-xnrqNHG_plW1GDDvEsm9Wu2LJ2LZ4FQDnEhjL1paXQXkwM1f8pa3uwjtkGvzJuSiZTcZB5Z48EQ_zCDBVkDra7lAE_GcQAOB2gQg",
              patterns={"MiniMax", "minimax"} },
            { name="kimi", host="api.kimi.com", path="/coding/v1/messages",
              key="sk-kimi-gznSCeceXldE4l6bo3avT2az0r0QwACXqpoq8WLtPiCDxCwe2NQ3eat7MgcjHdd4",
              patterns={"kimi", "Kimi"} },
            { name="openrouter", host="openrouter.ai", path="/api/v1/messages",
              key="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",
              patterns={"claude", "anthropic"} },
        }

        -- 根据模型名匹配供应商
        function match_provider(model)
            for _, p in ipairs(_G.providers) do
                for _, pat in ipairs(p.patterns) do
                    if model:find(pat) then return p end
                end
            end
            -- openrouter 作为默认供应商
            for _, p in ipairs(_G.providers) do
                if p.name == "openrouter" then return p end
            end
        end
    }

    server {
        listen 8080;
        set $upstream_provider "-";
        set $upstream_model "-";

        location = /health {
            content_by_lua_block { ngx.say('{"status":"ok"}') }
        }

        location /v1/messages {
            content_by_lua_block {
                -- count_tokens 端点直接返回模拟响应
                if ngx.var.request_uri:find("count_tokens") then
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say('{"input_tokens":0}')
                    return
                end

                local http = require "resty.http"
                local cjson = require "cjson"

                -- 校验 token
                local headers = ngx.req.get_headers()
                local token = headers["x-api-key"] or ""
                if token == "" then
                    local auth = headers["Authorization"] or headers["authorization"] or ""
                    token = auth:match("Bearer%s+(.+)") or ""
                end
                if token ~= "a" then ngx.status=401; ngx.say('{"error":"unauthorized"}'); return end

                ngx.req.read_body()
                local body = ngx.req.get_body_data()
                if not body then ngx.status=400; ngx.say('{"error":"empty body"}'); return end

                local ok_data, data = pcall(cjson.decode, body)
                if not ok_data then ngx.status=400; ngx.say('{"error":"bad json"}'); return end

                local model = data.model or ""
                ngx.var.upstream_model = model

                -- 匹配供应商
                local provider = match_provider(model)
                ngx.var.upstream_provider = provider.name

                -- 构建请求路径
                local req_path = provider.path
                local args = ngx.var.args
                if args then req_path = req_path .. "?" .. args end

                -- 发送请求
                local httpc = http.new()
                httpc:set_timeouts(30000, 120000, 300000)
                local ok, err = httpc:connect(provider.host, 443)
                if not ok then ngx.status=502; ngx.say('{"error":"connect('..provider.name..'): '..err..'"}'); return end
                local _, err = httpc:ssl_handshake(nil, provider.host, false)
                if err then httpc:close(); ngx.status=502; ngx.say('{"error":"ssl('..provider.name..'): '..err..'"}'); return end

                local res, err = httpc:request({
                    method = "POST",
                    path = req_path,
                    body = body,
                    headers = {
                        ["Content-Type"] = "application/json",
                        ["x-api-key"] = provider.key,
                        ["Authorization"] = "Bearer " .. provider.key,
                        ["Host"] = provider.host,
                        ["anthropic-version"] = "2023-06-01",
                    },
                })

                if not res then
                    httpc:close()
                    ngx.status=502; ngx.say('{"error":"'..err..'"}'); return
                end

                -- 转发响应头
                ngx.status = res.status
                for k, v in pairs(res.headers) do
                    local lk = k:lower()
                    if lk ~= "transfer-encoding" and lk ~= "connection" then
                        ngx.header[k] = v
                    end
                end
                if data.stream then ngx.header["X-Accel-Buffering"] = "no" end

                -- 流式转发响应体
                local reader = res.body_reader
                if reader then
                    repeat
                        local chunk, err = reader(8192)
                        if chunk then ngx.print(chunk); ngx.flush(true) end
                    until not chunk
                end
                httpc:set_keepalive(60000, 10)
            }
        }
    }
}
