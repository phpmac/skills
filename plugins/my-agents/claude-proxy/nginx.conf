# Claude Code 多供应商代理 - 根据模型名自动路由
# 启动: docker run -d --name claude-proxy --restart always -p 7:8080 -v ~/Downloads/skills/plugins/my-agents/claude-proxy/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro openresty/openresty:alpine-fat sh -c "opm get ledgetech/lua-resty-http 2>/dev/null; openresty -g 'daemon off;'"
worker_processes auto;
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # DNS 配置: 使用公共 DNS + 缓存 (禁用 IPv6 避免 Docker 网络问题)
    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
    resolver_timeout 5s;

    # DNS 缓存配置 (用于 lua-resty-dns-cache)
    lua_shared_dict dns_cache 1m;

    # 熔断器: 记录供应商健康状态
    lua_shared_dict circuit_breaker 1m;

    # 日志显示供应商和模型
    log_format main '$remote_addr [$time_local] $status $body_bytes_sent '
                    '$request_time [$upstream_provider] model="$upstream_model"';
    access_log /dev/stdout main;

    client_max_body_size 50m;
    client_body_buffer_size 50m;

    init_by_lua_block {
        _G.providers = {
            { name="zai", host="api.z.ai", path="/api/anthropic/v1/messages",
              key="dbbcb136a5714cfb829e0b074a3e43aa.kfw0nT1CqXLzESs0",
              patterns={"glm", "GLM"},
              fallback="aliyun" },
            { name="minimax", host="api.minimaxi.com", path="/anthropic/v1/messages",
              key="sk-cp-_QIpjsNBeB72vn_2kv-xnrqNHG_plW1GDDvEsm9Wu2LJ2LZ4FQDnEhjL1paXQXkwM1f8pa3uwjtkGvzJuSiZTcZB5Z48EQ_zCDBVkDra7lAE_GcQAOB2gQg",
              patterns={"MiniMax", "minimax"},
              fallback="aliyun" },
            { name="kimi", host="api.kimi.com", path="/coding/v1/messages",
              key="sk-kimi-gznSCeceXldE4l6bo3avT2az0r0QwACXqpoq8WLtPiCDxCwe2NQ3eat7MgcjHdd4",
              patterns={"kimi", "Kimi"},
              fallback="aliyun" },
            { name="aliyun", host="coding.dashscope.aliyuncs.com", path="/apps/anthropic/v1/messages",
              key="sk-sp-c87d34ab4e354ab182dd7457da343c57",
              patterns={},
              fallback=nil },  -- 仅作备用
            { name="openrouter", host="openrouter.ai", path="/api/v1/messages",
              key="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",
              patterns={"claude", "anthropic"},
              fallback=nil },
        }

        -- 根据模型名匹配供应商
        function match_provider(model)
            for _, p in ipairs(_G.providers) do
                for _, pat in ipairs(p.patterns) do
                    if model:find(pat) then return p end
                end
            end
            return _G.providers[5]  -- openrouter 作为默认
        end

        -- 根据名称获取供应商配置
        function get_provider_by_name(name)
            for _, p in ipairs(_G.providers) do
                if p.name == name then return p end
            end
            return nil
        end

        -- 自动重试备用模型数组: 主模型非 200 时按顺序切换
        -- 所有备用都失败后返回错误
        _G.autoRetry = {"GLM-5.1","MiniMax-M2.7-highspeed","kimi-k2.5"}
    }

    server {
        listen 8080;
        set $upstream_provider "-";
        set $upstream_model "-";

        location = /health {
            content_by_lua_block { ngx.say('{"status":"ok"}') }
        }

        location /v1/messages {
            content_by_lua_block {
                -- count_tokens 端点直接返回模拟响应
                if ngx.var.request_uri:find("count_tokens") then
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say('{"input_tokens":0}')
                    return
                end

                local http = require "resty.http"
                local cjson = require "cjson"

                -- 校验 token
                local headers = ngx.req.get_headers()
                local token = headers["x-api-key"] or ""
                if token == "" then
                    local auth = headers["Authorization"] or headers["authorization"] or ""
                    token = auth:match("Bearer%s+(.+)") or ""
                end
                if token ~= "a" then ngx.status=401; ngx.say('{"error":"unauthorized"}'); return end

                ngx.req.read_body()
                local body = ngx.req.get_body_data()
                if not body then ngx.status=400; ngx.say('{"error":"empty body"}'); return end

                local ok_data, data = pcall(cjson.decode, body)
                if not ok_data then ngx.status=400; ngx.say('{"error":"bad json"}'); return end

                local model = data.model or ""
                ngx.var.upstream_model = model

                -- ========== 熔断器 ==========
                local cb = ngx.shared.circuit_breaker
                local CB_THRESHOLD = 3   -- 连续失败次数触发熔断
                local CB_COOLDOWN = 60   -- 初始冷却秒数
                local CB_MAX_CD = 300    -- 最大冷却秒数

                -- 检查供应商状态: "closed"/"open"/"half-open"
                local function cb_check(name)
                    local val = cb:get(name)
                    if not val then return "closed" end
                    local s = cjson.decode(val)
                    if not s.open then return "closed" end
                    local elapsed = ngx.now() - s.lf
                    if elapsed >= s.cd then return "half-open" end
                    return "open"
                end

                -- 记录成功
                local function cb_success(name)
                    cb:set(name, cjson.encode({fc=0, lf=0, open=false, cd=CB_COOLDOWN}))
                end

                -- 记录失败
                local function cb_failure(name)
                    local val = cb:get(name)
                    local s
                    if val then
                        s = cjson.decode(val)
                        s.fc = s.fc + 1
                    else
                        s = {fc=1, lf=ngx.now(), open=false, cd=CB_COOLDOWN}
                    end
                    if s.fc >= CB_THRESHOLD then
                        s.open = true
                        s.lf = ngx.now()
                        s.cd = math.min((s.cd or CB_COOLDOWN) * 2, CB_MAX_CD)
                        ngx.log(ngx.WARN, "[熔断触发] ", name, " 连续失败", s.fc, "次, 冷却", s.cd, "s")
                    end
                    cb:set(name, cjson.encode(s))
                end

                -- ========== 发送请求 ==========
                local function send_request(provider, req_body, is_retry)
                    local httpc = http.new()
                    httpc:set_timeouts(30000, 120000, 300000)
                    local ok, err = httpc:connect(provider.host, 443)
                    if not ok then return nil, "connect("..provider.name.."): "..err, httpc end
                    local _, err = httpc:ssl_handshake(nil, provider.host, false)
                    if err then
                        httpc:close()
                        if not is_retry then
                            ngx.log(ngx.WARN, "[SSL 失败, 重试] ", provider.name, " (", provider.host, ") ", err)
                            return send_request(provider, req_body, true)
                        end
                        return nil, "ssl("..provider.name.."): "..err, httpc
                    end

                    local res, err = httpc:request({
                        method = "POST",
                        path = provider.path,
                        body = req_body,
                        headers = {
                            ["Content-Type"] = "application/json",
                            ["x-api-key"] = provider.key,
                            ["Authorization"] = "Bearer " .. provider.key,
                            ["Host"] = provider.host,
                            ["anthropic-version"] = "2023-06-01",
                        },
                    })
                    return res, err, httpc
                end

                -- ========== 故障转移 ==========
                local is_auto = (model == "auto")
                local retry_index = 0
                local last_err = nil
                local current_model

                -- auto 模式: 从 autoRetry[1] 开始轮询
                -- 普通模式: 用用户指定的模型, 失败后按顺序切备用 (跳过和原始相同的)
                if is_auto then
                    if #_G.autoRetry < 1 then
                        ngx.status=502; ngx.say('{"error":"auto mode but no autoRetry configured"}'); return
                    end
                    current_model = _G.autoRetry[1]
                    retry_index = 1
                else
                    current_model = model
                end

                -- 获取下一个备用模型
                local function get_next()
                    while retry_index < #_G.autoRetry do
                        retry_index = retry_index + 1
                        local next_m = _G.autoRetry[retry_index]
                        ngx.log(ngx.INFO, "[自动路由] retry_index=", retry_index, " next_m=", next_m)
                        if next_m ~= model then return next_m end
                        ngx.log(ngx.INFO, "[跳过] ", next_m, " 与原始模型相同")
                    end
                    ngx.log(ngx.INFO, "[自动路由] 无更多备用, 已遍历全部 ", #_G.autoRetry)
                    return nil
                end

                local function try_current_provider()
                    local current_p = match_provider(current_model)
                    ngx.var.upstream_provider = current_p.name

                    -- 检查熔断状态
                    local cb_state = cb_check(current_p.name)
                    if cb_state == "open" then
                        local next_m = get_next()
                        if next_m then
                            local next_p = match_provider(next_m)
                            ngx.log(ngx.WARN, "[熔断跳过] ", current_model, "(", current_p.name, ") -> ", next_m, "(", next_p.name, ")")
                            current_model = next_m
                            return try_current_provider()
                        end
                        ngx.log(ngx.ERR, "[熔断] 所有供应商均熔断")
                        return nil, "all providers circuit broken", nil
                    end

                    local prefix = (cb_state == "half-open") and "[半开] " or ""
                    ngx.log(ngx.INFO, prefix, "[路由] ", model, " -> ", current_model, " (", current_p.name, ")")

                    local res, err, httpc = send_request(current_p, body)

                    -- 连接/SSL 失败
                    if not res then
                        last_err = err
                        cb_failure(current_p.name)
                        local next_m = get_next()
                        if next_m then
                            local next_p = match_provider(next_m)
                            ngx.log(ngx.WARN, "[故障转移] ", current_model, "(", current_p.name, ") 连接失败 -> ", next_m, "(", next_p.name, ")")
                            current_model = next_m
                            return try_current_provider()
                        end
                        ngx.log(ngx.ERR, "[", current_p.name, " 连接失败] ", err, " 无更多备用")
                        return nil, err, httpc
                    end

                    -- 非 200 响应
                    if res.status ~= 200 then
                        local err_body = res:read_body()
                        httpc:set_keepalive(60000, 10)
                        cb_failure(current_p.name)
                        local next_m = get_next()
                        if next_m then
                            local next_p = match_provider(next_m)
                            ngx.log(ngx.WARN, "[故障转移] ", current_model, "(", current_p.name, ") ", res.status, " -> ", next_m, "(", next_p.name, ")")
                            current_model = next_m
                            return try_current_provider()
                        end
                        ngx.log(ngx.WARN, "[", current_p.name, " ", res.status, "] 无更多备用")
                        return res, nil, httpc
                    end

                    -- 成功: 重置熔断
                    cb_success(current_p.name)
                    return res, nil, httpc
                end

                local res, err, httpc = try_current_provider()
                if not res then ngx.status=502; ngx.say('{"error":"'..(err or last_err or "request failed")..'"}'); return end

                -- 转发响应头
                ngx.status = res.status
                for k, v in pairs(res.headers) do
                    local lk = k:lower()
                    if lk ~= "transfer-encoding" and lk ~= "connection" then
                        ngx.header[k] = v
                    end
                end
                if data.stream then ngx.header["X-Accel-Buffering"] = "no" end

                -- 流式转发响应体
                local reader = res.body_reader
                if reader then
                    repeat
                        local chunk, err = reader(8192)
                        if chunk then ngx.print(chunk); ngx.flush(true) end
                    until not chunk
                end
                httpc:set_keepalive(60000, 10)
            }
        }
    }
}
